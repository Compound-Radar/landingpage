<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks — Compound Radar</title>
  <meta name="robots" content="noindex" />

  <!-- Favicon: inline SVG radar-dot, deep teal on off-white -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23FAFAF7'/><circle cx='16' cy='16' r='12' fill='none' stroke='%230D5C63' stroke-width='1.5' opacity='.3'/><circle cx='16' cy='16' r='7' fill='none' stroke='%230D5C63' stroke-width='1.5' opacity='.6'/><circle cx='16' cy='16' r='3' fill='%230D5C63'/><line x1='16' y1='16' x2='24' y2='8' stroke='%230D5C63' stroke-width='1.5' opacity='.75'/></svg>" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FAFAF7;
      --ink:       #1A1F1E;
      --muted:     #5A6B68;
      --accent:    #0D5C63;
      --accent-lo: rgba(13,92,99,.10);
      --rule:      #E3E0D8;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter",
                   "Segoe UI", system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .serif {
      font-family: ui-serif, "Charter", "Iowan Old Style", Georgia,
                   "Times New Roman", serif;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px;
      width: 100%;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    header {
      padding: 32px 0 28px;
      border-bottom: 1px solid var(--rule);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--accent);
    }

    .wordmark {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--accent);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 64px 0;
    }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--accent-lo);
    }

    h1 {
      font-size: clamp(30px, 4.5vw, 42px);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -.015em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .body-text {
      font-size: 18px;
      line-height: 1.65;
      color: var(--ink);
      opacity: .82;
      margin-bottom: 36px;
      max-width: 560px;
    }

    .back-link {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-lo);
      padding-bottom: 2px;
      transition: border-color .15s ease;
    }

    .back-link:hover { border-bottom-color: var(--accent); }

    footer {
      border-top: 1px solid var(--rule);
      padding: 32px 0 40px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap">
      <a href="/" class="brand" aria-label="Compound Radar — home">
        <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10" fill="none" stroke="#0D5C63" stroke-width="1.25" opacity=".3"/>
          <circle cx="12" cy="12" r="6"  fill="none" stroke="#0D5C63" stroke-width="1.25" opacity=".6"/>
          <circle cx="12" cy="12" r="2"  fill="#0D5C63"/>
          <line x1="12" y1="12" x2="20" y2="5" stroke="#0D5C63" stroke-width="1.25" opacity=".75"/>
        </svg>
        <span class="wordmark">Compound Radar</span>
      </a>
    </div>
  </header>

  <main>
    <div class="wrap">
      <span class="eyebrow">Received</span>
      <h1 class="serif">Thanks — we'll be in touch.</h1>
      <p class="body-text">
        We've received your request and will reach out shortly to learn more about
        your practice and walk you through what we're building.
      </p>
      <a href="/" class="back-link">← Back to compoundradar.com</a>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <span>compoundradar.com &nbsp;·&nbsp; © 2026 Compound Radar</span>
    </div>
  </footer>

</body>
</html>
